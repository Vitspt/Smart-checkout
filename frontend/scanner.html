<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Scanner — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .scanner-container { 
      background: #000; 
      border-radius: 24px; 
      overflow: hidden; 
      position: relative; 
      width: 100%; 
      aspect-ratio: 4/5; 
      box-shadow: var(--shadow-lg);
    }
    #reader { width: 100%; height: 100%; }
    
    .scan-overlay { 
      position: absolute; inset: 0; 
      border: 2px solid rgba(255,255,255,0.1); 
      pointer-events: none; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
    }
    .scan-box { 
      width: 220px; height: 220px; 
      border: 4px solid var(--primary); 
      border-radius: 24px; 
      position: relative; 
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
    }
    .scan-line { 
      position: absolute; top: 10%; left: 10%; right: 10%; 
      height: 3px; background: var(--primary); 
      box-shadow: 0 0 15px var(--primary);
      animation: scanAnim 2s ease-in-out infinite; 
    }
    @keyframes scanAnim { 0%, 100% { top: 10%; } 50% { top: 90%; } }

    .manual-input { 
      display: flex; gap: 10px; margin-top: 24px; 
      background: #fff; padding: 6px; border-radius: 16px; 
      border: 1.5px solid var(--border);
    }
    .manual-input input { flex: 1; border: none; padding: 0 12px; font-weight: 700; font-size: 16px; }
  </style>
</head>

<body class="page-anim">
  <div class="mesh-bg"></div>

  <header class="topbar">
    <div class="tb-left">
      <button class="tb-btn" onclick="history.back()" style="color:var(--text)">
        <span class="material-icons">arrow_back</span>
      </button>
    </div>
    <div class="topbar-logo">SCANNER</div>
    <div class="tb-right"></div>
  </header>

  <div class="page">
    <div class="scanner-container">
      <div id="reader"></div>
      <div class="scan-overlay">
        <div class="scan-box">
          <div class="scan-line"></div>
        </div>
        <p style="color:#fff;font-weight:700;margin-top:20px;font-size:13px;letter-spacing:1px">ALIGN BARCODE WITHIN BOX</p>
      </div>
    </div>

    <div class="manual-input">
      <input type="text" id="manual-code" placeholder="Enter Barcode ID (e.g. 1001)" />
      <button class="btn btn-primary" style="width:auto;padding:0 20px" onclick="handleManualScan()">ADD</button>
    </div>

    <div id="recent-scanned" style="margin-top:32px">
      <h3 style="font-size:16px;font-weight:800;margin-bottom:12px">Recently Added</h3>
      <div id="recent-list">
        <!-- Recent items -->
      </div>
    </div>
  </div>

  <div id="toasts"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    let scanner = null;
    let lastScan = null;
    let scanTimeout = null;

    function toast(msg, type='green') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span class="material-icons">check_circle</span> ${msg}`;
      document.getElementById('toasts').appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function handleScan(code) {
      if (lastScan === code) return;
      lastScan = code;
      clearTimeout(scanTimeout);
      scanTimeout = setTimeout(() => { lastScan = null; }, 3000);

      const p = getProductByBarcode(code);
      if (p) {
        if (navigator.vibrate) navigator.vibrate(100);
        addToCart(p);
        toast(`Added ${p.name} to cart!`);
        renderRecent();
      } else {
        toast(`Item ${code} not in database`, 'red');
      }
    }

    function handleManualScan() {
      const code = document.getElementById('manual-code').value.trim();
      if (code) {
        handleScan(code);
        document.getElementById('manual-code').value = '';
      }
    }

    function renderRecent() {
      const history = JSON.parse(localStorage.getItem(ukey('scan_history')) || '[]');
      const wrap = document.getElementById('recent-list');
      if (!history.length) {
        wrap.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No items added yet.</p>';
        return;
      }
      wrap.innerHTML = history.slice(0, 3).map(i => `
        <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:10px">
          <div style="font-size:24px;width:40px;height:40px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center">${i.emoji || '🛒'}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700">${i.name}</div>
            <div style="font-size:12px;color:var(--primary);font-weight:800">₹${i.price}</div>
          </div>
          <div style="font-size:11px;color:var(--text-muted)">${i.time}</div>
        </div>
      `).join('');
    }

    function startScanner() {
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => handleScan(decodedText)
      ).catch(err => console.error("Scanner error:", err));
    }

    renderRecent();
    // In a real environment, we call startScanner()
    // For demo/dev, we just use manual input
    console.log("Scanner ready. Use manual input for simulation.");
  </script>
</body>
</html>
