<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SmartCheckout — In-Store Smart Checkout</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
body{margin:0;min-height:100vh;background:var(--green);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.splash-logo{font-size:72px;animation:pulse 1.5s ease infinite}
.splash-title{font-size:28px;font-weight:900;color:#fff;letter-spacing:.5px}
.splash-sub{font-size:14px;color:rgba(255,255,255,.8);margin-top:4px}
.splash-loader{display:flex;gap:6px;margin-top:24px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.5)}
.dot:nth-child(1){animation:bounce .9s .0s ease infinite}
.dot:nth-child(2){animation:bounce .9s .15s ease infinite}
.dot:nth-child(3){animation:bounce .9s .3s ease infinite}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-12px);background:#fff}}
</style>
</head>
<body>
<div class="splash-logo">🛒</div>
<div style="text-align:center">
  <div class="splash-title">SmartCheckout</div>
  <div class="splash-sub">In-Store Smart Checkout System</div>
</div>
<div class="splash-loader">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<script>setTimeout(()=>{ window.location.href = localStorage.getItem('ssc_session') ? 'home.html' : 'login.html'; }, 2600);</script>
</body>
</html>
