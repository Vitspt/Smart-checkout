<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Payment — SmartCheckout</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body class="page-anim">

<header class="topbar">
  <div class="tb-left">
    <a href="javascript:history.back()" class="tb-btn"><span class="material-icons">chevron_left</span></a>
    <a href="javascript:history.forward()" class="tb-btn"><span class="material-icons">chevron_right</span></a>
  </div>
  <div class="topbar-logo">Checkout</div>
  <div class="tb-right"></div>
</header>

<div class="page" style="padding-top:14px; padding-bottom: 180px;" id="pay-page">
  <div style="display:flex;align-items:center;justify-content:center;height:60vh;font-size:24px;color:var(--muted)">Loading...</div>
</div>

<!-- AUDIT OVERLAY -->
<div class="success-overlay" id="audit-overlay" style="display:none;background:rgba(15,23,42,0.98)">
  <div class="success-card" style="border-top:5px solid var(--amber)">
    <div style="font-size:48px">🕵️</div>
    <h2 style="font-size:22px;font-weight:900;margin:12px 0 6px">Random Security Audit</h2>
    <p style="color:var(--muted);font-size:14px">For your safety, a staff member will briefly verify your cart. Please stay at your position.</p>
    <div style="margin-top:20px;padding:12px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;color:#92400e;font-weight:700;font-size:13px">
      Verification Code: <span id="audit-code" style="font-family:monospace;font-size:18px">...</span>
    </div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="finishPaymentAfterAudit()">
      I'm Verified (Demo)
    </button>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="success-overlay" style="display:none">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h2 style="font-size:22px;font-weight:900;margin:12px 0 6px">Payment Successful!</h2>
    <p style="color:var(--muted);font-size:14px">Generating your QR receipt...</p>
    <div style="display:flex;gap:6px;justify-content:center;margin-top:16px">
      <div class="dot" style="animation:bounce .9s .0s ease infinite"></div>
      <div class="dot" style="animation:bounce .9s .15s ease infinite"></div>
      <div class="dot" style="animation:bounce .9s .3s ease infinite"></div>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
let selectedMethod = 'upi';

function selectMethod(m){
  selectedMethod = m;
  document.querySelectorAll('.pay-option').forEach(el => el.classList.toggle('selected', el.dataset.method===m));
}

async function init(){
  const cart = getCart();
  if(!cart.length){ location.href='cart.html'; return; }
  const subtotal=getCartSubtotal(), mrp=getCartMRP();
  
  let finalSubtotal = subtotal;
  let couponDisc = 0;
  const activeCoupon = JSON.parse(localStorage.getItem(ukey('active_coupon')) || 'null');
  if(activeCoupon) {
    couponDisc = Math.round(subtotal * (activeCoupon.discount / 100));
    finalSubtotal = subtotal - couponDisc;
  }

  const disc=mrp-subtotal, tax=Math.round(finalSubtotal*TAX_RATE), total=finalSubtotal+tax;

  document.getElementById('pay-page').innerHTML=`
    <!-- ITEM LIST -->
    <div class="card">
      <div style="font-size:14px;font-weight:800;margin-bottom:10px">Order Summary (${cart.length} items)</div>
      ${cart.map(i=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            ${i.img ? `<img src="${i.img}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.innerHTML='${i.emoji}'"/>` : i.emoji}
          </div>
          <div style="flex:1;font-size:13px;font-weight:700">${i.name} <span style="color:var(--muted);font-weight:500">×${i.qty}</span></div>
          <div style="font-size:14px;font-weight:800;color:var(--green)">${formatPrice(i.price*i.qty)}</div>
        </div>`).join('')}
    </div>

    <!-- PRICE BREAKDOWN -->
    <div class="card">
      <div style="font-size:14px;font-weight:800;margin-bottom:8px">Price Details</div>
      <div class="price-row"><span>Subtotal (MRP)</span><span>${formatPrice(mrp)}</span></div>
      ${disc>0?`<div class="price-row green"><span>Product Discount</span><span>− ${formatPrice(disc)}</span></div>`:''}
      ${couponDisc>0?`<div class="price-row green" style="font-weight:800"><span>Coupon (${activeCoupon.code})</span><span>− ${formatPrice(couponDisc)}</span></div>`:''}
      ${tax>0?`<div class="price-row"><span>GST</span><span>+ ${formatPrice(tax)}</span></div>`:''}
      <div class="price-row total"><span>Amount Payable</span><span style="color:var(--green)">${formatPrice(total)}</span></div>
    </div>

    <!-- PAYMENT OPTIONS -->
    <div class="card">
      <div style="font-size:14px;font-weight:800;margin-bottom:12px">Choose Payment Method</div>
      <div class="pay-option selected" data-method="upi" onclick="selectMethod('upi')">
        <span class="material-icons">phone_android</span>
        <div><h4>UPI</h4><p>GPay, PhonePe, Paytm</p></div>
        <div class="pay-radio"></div>
      </div>
      <div class="pay-option" data-method="card" onclick="selectMethod('card')">
        <span class="material-icons">credit_card</span>
        <div><h4>Debit / Credit Card</h4><p>Visa, Mastercard, RuPay</p></div>
        <div class="pay-radio"></div>
      </div>
      <div class="pay-option" data-method="wallet" onclick="selectMethod('wallet')">
        <span class="material-icons">account_balance_wallet</span>
        <div><h4>Wallet</h4><p>Paytm Wallet, Amazon Pay</p></div>
        <div class="pay-radio"></div>
      </div>
    </div>

    <div class="sticky-cta" style="bottom: 0; background: var(--bg); padding-bottom: 32px;">
      <button class="btn btn-primary" id="pay-btn" onclick="processPayment(${total})" style="box-shadow: 0 8px 32px rgba(239, 77, 35, 0.4);">
        <span class="material-icons">lock</span> Pay Securely — ${formatPrice(total)}
      </button>
      <div style="text-align:center;font-size:12px;color:var(--muted);opacity:0.8">🔒 256-bit secure payment simulation</div>
    </div>
  `;
}

function processPayment(total){
  const btn=document.getElementById('pay-btn');
  btn.innerHTML='<span class="material-icons" style="animation:spin 1s linear infinite">refresh</span> Processing...';
  btn.disabled=true;

  setTimeout(()=>{
    const needsAudit = Math.random() < 0.2; // 20% chance
    if(needsAudit){
      document.getElementById('audit-overlay').style.display='flex';
      document.getElementById('audit-code').textContent = Math.floor(1000 + Math.random()*9000);
      return;
    }
    finishPayment();
  }, 2000);
}

function finishPaymentAfterAudit(){
  document.getElementById('audit-overlay').style.display='none';
  finishPayment();
}

function finishPayment(){
  const cart=getCart();
  const subtotal=getCartSubtotal(), tax=Math.round(subtotal*TAX_RATE), total=subtotal+tax;
  const order={
    id:'ORD'+Date.now(),
    items:cart,
    total,
    method:selectedMethod,
    status:'Paid',
    time:new Date().toISOString()
  };
  savePurchaseHistory(order);
  localStorage.setItem('ssc_last_order', JSON.stringify(order));
  clearCart();
  document.getElementById('success-overlay').style.display='flex';
  setTimeout(()=>location.href='qrcode.html', 2000);
}

init();
</script>
</body>
</html>
