<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Security Verification — SmartCheckout</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
.security-page{padding:40px 14px 120px;display:flex;flex-direction:column;align-items:center}
.v-box{width:100%;max-width:320px;aspect-ratio:1;border-radius:32px;overflow:hidden;position:relative;background:#000;margin-bottom:24px;border:1px solid var(--border)}
#reader{width:100%;height:100%}
.status-card{width:100%;max-width:340px;padding:24px;text-align:center;display:none}
.log-card{width:100%;max-width:340px;margin-top:20px;font-size:12px;color:var(--muted)}
</style>
</head>
<body class="page-anim" style="background:#0b0f1a">
<div class="mesh-bg"></div>

<header class="topbar">
  <a href="home.html" class="tb-btn"><span class="material-icons">arrow_back</span></a>
  <div class="topbar-logo">Security <span style="color:#ef4d23">Verify</span></div>
</header>

<div class="security-page">
  <div style="text-align:center;margin-bottom:24px">
    <h2 style="margin:0;font-size:22px;font-weight:900">Scan Customer QR</h2>
    <p style="font-size:14px;color:var(--muted)">Verify receipt before store exit</p>
  </div>

  <div class="v-box">
    <div id="reader"></div>
  </div>

  <div id="verify-status" class="status-card glass-card">
    <!-- Status will appear here -->
  </div>

  <div id="verify-log" class="log-card"></div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let scanner = null;

async function onScanSuccess(decodedText) {
  if(scanner) scanner.pause(true);
  
  const statusEl = document.getElementById('verify-status');
  statusEl.style.display = 'block';
  statusEl.innerHTML = '<div style="color:var(--muted)">Verifying...</div>';

  try {
    const data = JSON.parse(decodedText);
    const orderId = data.id;

    if(!orderId) throw new Error('Invalid QR Data');

    const token = localStorage.getItem('ssc_token');
    const response = await fetch(`/api/orders/${orderId}/verify`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });

    const result = await response.json();
    
    if(result.success) {
      statusEl.innerHTML = `
        <div style="font-size:48px">✅</div>
        <h3 style="color:#10b981;font-weight:900">VERIFIED</h3>
        <p style="font-size:13px;margin:8px 0">Order #${orderId.slice(-8)} is valid.</p>
        <div style="background:rgba(16,185,129,0.1);padding:10px;border-radius:12px;font-size:12px;font-weight:700;color:#10b981">
          CUSTOMER MAY EXIT
        </div>
        <button class="btn btn-primary" style="margin-top:20px;width:100%" onclick="resetScanner()">Scan Next</button>
      `;
      logVerification(`Order ${orderId} - SUCCESS`);
    } else {
      statusEl.innerHTML = `
        <div style="font-size:48px">⚠️</div>
        <h3 style="color:#ef4444;font-weight:900">FAILED</h3>
        <p style="font-size:13px;margin:8px 0">${result.message}</p>
        <button class="btn btn-outline" style="margin-top:20px;width:100%" onclick="resetScanner()">Try Again</button>
      `;
      logVerification(`Order ${orderId} - FAILED: ${result.message}`);
    }

  } catch(e) {
    statusEl.innerHTML = `
      <div style="font-size:48px">❌</div>
      <h3 style="color:#ef4444;font-weight:900">INVALID QR</h3>
      <p style="font-size:13px;margin:8px 0">This is not a valid SmartCheckout receipt.</p>
      <button class="btn btn-outline" style="margin-top:20px;width:100%" onclick="resetScanner()">Try Again</button>
    `;
    console.error(e);
  }
}

function resetScanner() {
  document.getElementById('verify-status').style.display = 'none';
  if(scanner) scanner.resume();
}

function logVerification(msg) {
  const logEl = document.getElementById('verify-log');
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML = `<div>[${time}] ${msg}</div>` + logEl.innerHTML;
}

async function startScanner() {
  scanner = new Html5Qrcode("reader");
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };
  try {
    await scanner.start({ facingMode: "environment" }, config, onScanSuccess);
  } catch(e) {
    console.error("Camera failed", e);
  }
}

if(!getSession()) location.href = 'login.html';
else startScanner();
</script>
</body>
</html>
