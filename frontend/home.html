<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Home — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .home-header { padding: 10px 0 20px; }
    .search-box { 
      background: #fff; 
      border: 1.5px solid var(--border); 
      border-radius: 16px; 
      height: 52px; 
      display: flex; 
      align-items: center; 
      padding: 0 16px; 
      gap: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .search-box input { flex: 1; border: none; font-size: 15px; font-weight: 500; color: var(--text); }
    
    .promo-banner { 
      background: linear-gradient(135deg, var(--primary), #22c55e); 
      border-radius: 24px; 
      padding: 24px; 
      color: #fff; 
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
    }
    .promo-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .promo-sub { font-size: 13px; opacity: 0.9; }
    
    .cat-btn { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 8px; 
      min-width: 80px; 
      cursor: pointer; 
    }
    .cat-icon { 
      width: 60px; 
      height: 60px; 
      border-radius: 20px; 
      background: #fff; 
      border: 1.5px solid var(--border); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 28px; 
      transition: all 0.2s;
    }
    .cat-btn.active .cat-icon { background: var(--primary); color: #fff; border-color: var(--primary); transform: translateY(-4px); }
    .cat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); }
  </style>
</head>

<body class="page-anim">
  <div class="mesh-bg"></div>

  <header class="topbar">
    <div class="tb-left">
      <div style="font-family:'Outfit';font-weight:900;color:var(--primary);font-size:22px">CONVIX</div>
    </div>
    <div class="tb-right">
      <button class="tb-btn badge" onclick="location.href='cart.html'" style="color:var(--text)">
        <span class="material-icons">shopping_bag</span>
        <span class="badge-dot cart-badge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <div class="page">
    <div class="home-header">
      <h1 style="font-size:24px;font-weight:900;margin-bottom:16px">Welcome to <span style="color:var(--primary)">Smart Store</span></h1>
      <div class="search-box">
        <span class="material-icons" style="color:var(--primary)">search</span>
        <input type="text" placeholder="Search for items..." oninput="uiSearch(this.value)" />
        <span class="material-icons" style="color:var(--text-muted);cursor:pointer">mic</span>
      </div>
    </div>

    <div class="promo-banner">
      <div class="promo-title">Fast & Secure</div>
      <div class="promo-sub">Scan products and pay instantly. No queues.</div>
      <span class="material-icons" style="position:absolute;right:-20px;bottom:-20px;font-size:120px;opacity:0.1">qr_code_scanner</span>
    </div>

    <div style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:18px;font-weight:800">Categories</h3>
      </div>
      <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:10px" id="cat-list">
        <!-- Categories -->
      </div>
    </div>

    <div style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:18px;font-weight:800">Trending Now</h3>
        <a href="category.html?c=All" style="font-size:13px;font-weight:700;color:var(--primary)">View All</a>
      </div>
      <div class="prod-grid" id="featured-grid">
        <!-- Products -->
      </div>
    </div>
  </div>

  <button class="fab-center" onclick="location.href='scanner.html'">
    <span class="material-icons">qr_code_scanner</span>
  </button>

  <nav class="bnav">
    <a href="home.html" class="ni active"><span class="material-icons">home</span>Home</a>
    <a href="category.html?c=All" class="ni"><span class="material-icons">grid_view</span>All</a>
    <div class="ni-placeholder"></div>
    <a href="cart.html" class="ni"><span class="material-icons">shopping_bag</span>Cart</a>
    <a href="profile.html" class="ni"><span class="material-icons">person</span>Profile</a>
  </nav>

  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    async function init() {
      const prods = await fetchProducts();
      renderGrid(prods.slice(0, 6), 'featured-grid');

      const cats = ['All', 'Grocery', 'Snacks', 'Drinks', 'Produce'];
      const catWrap = document.getElementById('cat-list');
      catWrap.innerHTML = cats.map(c => `
        <div class="cat-btn ${c === 'All' ? 'active' : ''}" onclick="location.href='category.html?c=${c}'">
          <div class="cat-icon">${CAT_EMOJIS[c] || '📦'}</div>
          <div class="cat-label">${c}</div>
        </div>
      `).join('');

      updateCartBadge();
    }

    function renderGrid(prods, id) {
      const wrap = document.getElementById(id);
      wrap.innerHTML = prods.map(p => `
        <div class="prod-card" onclick="location.href='product.html?id=${p.id}'">
          <div class="prod-img-box">
            ${p.img ? `<img src="${p.img}" style="width:100%;height:100%;object-fit:contain"/>` : p.emoji}
          </div>
          <div class="prod-name">${p.name}</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="prod-price">₹${p.price}</div>
            <div style="width:28px;height:28px;border-radius:8px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center">
              <span class="material-icons" style="font-size:18px">add</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function uiSearch(q) {
      const results = searchProducts(q);
      renderGrid(results, 'featured-grid');
    }

    init();
  </script>
</body>
</html>
