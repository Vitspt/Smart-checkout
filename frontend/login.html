<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — SmartCheckout</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.login-outer{min-height:100vh;background:#0b0f1a;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login-outer::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(239,77,35,.06);top:-80px;right:-80px}
.login-outer::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(239,77,35,.04);bottom:-60px;left:-60px}
.login-container{width:100%;max-width:390px;position:relative;z-index:1}
.login-slide-wrap{overflow:hidden;border-radius:24px;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.login-pane{display:flex;transition:transform .5s cubic-bezier(.77,0,.175,1);width:200%}
.login-card{width:50%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(20px);padding:32px 24px;color:#fff}
.login-header{text-align:center;margin-bottom:28px}
.login-logo{font-size:48px;display:block;margin-bottom:10px}
.login-title{font-size:24px;font-weight:900;color:var(--text)}
.login-sub{font-size:13px;color:var(--muted);margin-top:4px}
.tabs-mini{display:flex;gap:0;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:20px}
.tabs-mini .tab{flex:1;border-radius:8px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.6)}
.tabs-mini .tab.active{background:#ef4d23;color:#fff;box-shadow:0 4px 12px rgba(239,77,35,0.3)}
.success-pane{width:50%;background:#ef4d23;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;min-height:440px}
.success-pane h2{font-size:24px;font-weight:900;color:#fff;margin-top:16px}
.success-pane p{font-size:14px;color:rgba(255,255,255,.85);margin-top:6px}

</style>
</head>
<body>
<div class="login-outer">
  <div class="login-container">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:13px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.5px">IN-STORE SELF-CHECKOUT</div>
    </div>
    <div class="login-slide-wrap">
      <div class="login-pane" id="loginPane">
        <!-- FORM CARD -->
        <div class="login-card" id="formCard">
          <div class="login-header">
            <span class="login-logo">🛒</span>
            <div class="login-title">SmartCheckout</div>
            <div class="login-sub" id="formSub">Sign in to your account</div>
          </div>
          <div class="tabs-mini">
            <button class="tab active" id="tabLogin" onclick="switchTab('login')" data-i18n="sign_in">Sign In</button>
            <button class="tab" id="tabSignup" onclick="switchTab('signup')" data-i18n="sign_up">Sign Up</button>
          </div>

          <div id="signupFields" style="display:none">
            <div class="form-group">
              <label class="form-label" data-i18n="profile_name">Full Name</label>
              <input class="form-input" id="inp-name" type="text" data-i18n="profile_name" placeholder="Your full name"/>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="profile_phone">Phone Number</label>
              <input class="form-input" id="inp-phone" type="tel" data-i18n="profile_phone" placeholder="10-digit mobile number"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="profile_email">Email Address</label>
            <input class="form-input" id="inp-email" type="email" data-i18n="profile_email" placeholder="you@email.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="inp-pass" type="password" placeholder="Enter password"/>
          </div>
          <div id="err-msg" style="color:var(--red);font-size:13px;font-weight:600;margin-bottom:12px;display:none"></div>
          <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">Sign In</button>
          <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted)">
            <span id="switchText">Don't have an account? </span>
            <a href="#" id="switchLink" onclick="switchTab('signup');return false" style="color:var(--green);font-weight:700">Sign Up</a>
          </div>
          <div style="text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05)">
            <a href="admin_login.html" style="font-size:12px;color:var(--primary);text-decoration:none;font-weight:800;letter-spacing:1px">🛡️ LOGIN AS ADMIN</a>
          </div>
        </div>
        <!-- SUCCESS CARD -->
        <div class="success-pane" id="successCard">
          <div style="font-size:64px">✅</div>
          <h2>Welcome Back!</h2>
          <p id="welcomeMsg">Taking you to the store...</p>
          <div style="margin-top:24px;display:flex;gap:6px">
            <div class="dot" style="background:rgba(255,255,255,.6)"></div>
            <div class="dot" style="background:rgba(255,255,255,.6)"></div>
            <div class="dot" style="background:rgba(255,255,255,.6)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toasts"></div>
<!-- Supabase SDK & Config -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let isLogin = true;
if(getSession()) window.location.href = 'home.html';

function switchTab(mode){
  isLogin = mode === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  document.getElementById('signupFields').style.display = isLogin ? 'none' : 'block';
  document.getElementById('formSub').textContent = isLogin ? 'Sign in to your account' : 'Create a new account';
  document.getElementById('submitBtn').textContent = isLogin ? 'Sign In' : 'Create Account';
  document.getElementById('switchText').textContent = isLogin ? "Don't have an account? " : 'Already have an account? ';
  document.getElementById('switchLink').textContent = isLogin ? 'Sign Up' : 'Sign In';
  document.getElementById('switchLink').onclick = (e) => { e.preventDefault(); switchTab(isLogin ? 'signup' : 'login'); };
  document.getElementById('err-msg').style.display = 'none';
}

async function handleSubmit(){
  const email = document.getElementById('inp-email').value.trim();
  const pass = document.getElementById('inp-pass').value.trim();
  const errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';
  if(!email || !pass){ errEl.textContent = 'Please fill all fields'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('submitBtn');
  btn.textContent = '...'; btn.disabled = true;
  try{
    let user;
    if(isLogin){
      user = await signIn(email, pass);
    } else {
      const name = document.getElementById('inp-name').value.trim();
      const phone = document.getElementById('inp-phone').value.trim();
      if(!name){ throw new Error('Name is required'); }
      user = await signUp(name, email, pass, phone);
    }
    document.getElementById('welcomeMsg').textContent = `Hi ${user.name}! Taking you to the store...`;
    document.getElementById('loginPane').classList.add('login-slide');
    setTimeout(() => window.location.href = 'home.html', 1800);
  } catch(e){
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.textContent = isLogin ? 'Sign In' : 'Create Account'; btn.disabled = false;
  }
}
document.querySelectorAll('.form-input').forEach(el => el.addEventListener('keydown', e => { if(e.key === 'Enter') handleSubmit(); }));
</script>
</body>
</html>
