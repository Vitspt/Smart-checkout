<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Login — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .login-wrapper { 
      min-height: 100vh; display: flex; align-items: center; justify-content: center; 
      padding: 24px; background: #fff; position: relative; overflow: hidden;
    }
    .login-card { 
      width: 100%; max-width: 400px; background: #fff; z-index: 10;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .input-field { 
      background: var(--bg-soft); border: 1.5px solid var(--border); 
      border-radius: 16px; padding: 16px 20px; width: 100%; 
      font-size: 15px; font-weight: 600; margin-bottom: 16px;
      transition: all 0.2s;
    }
    .input-field:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-light); }
  </style>
</head>

<body class="page-anim">
  <div class="mesh-bg" style="background: radial-gradient(circle at 0% 100%, #f0fdf4 0%, #fff 100%);"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:40px">
        <div style="width:64px;height:64px;background:var(--primary);color:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 20px rgba(22,163,74,0.3)">
          <span class="material-icons" style="font-size:36px">qr_code_2</span>
        </div>
        <h1 style="font-size:28px;font-weight:900;color:var(--text)">CONVIX</h1>
        <p style="color:var(--text-muted);font-weight:600;font-size:14px">Smart Self-Checkout System</p>
      </div>

      <div id="login-form">
        <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Account Email</div>
        <input type="email" class="input-field" id="email" placeholder="Enter your email" value="demo@example.com" />
        
        <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Password</div>
        <input type="password" class="input-field" id="password" placeholder="••••••••" value="password123" />

        <button class="btn btn-primary" style="margin-top:8px" onclick="doLogin()">
          SIGN IN <span class="material-icons">login</span>
        </button>
      </div>

      <div style="margin-top:32px;text-align:center;font-size:13px;color:var(--text-muted);font-weight:600">
        Don't have an account? <span style="color:var(--primary);cursor:pointer">Register Now</span>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value.trim();
      
      if (!email || !pass) { alert('Please fill all fields'); return; }
      
      // Simulation
      localStorage.setItem('ssc_token', 'TOKEN_' + Date.now());
      localStorage.setItem('ssc_user', JSON.stringify({
        name: 'Demo User',
        email: email
      }));
      
      location.href = 'home.html';
    }
  </script>
</body>
</html>
