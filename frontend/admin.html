<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Panel — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .stat-card { 
      background: #fff; padding: 20px; border-radius: 20px; 
      border: 1.5px solid var(--border); box-shadow: var(--shadow);
    }
    .stat-val { font-size: 24px; font-weight: 900; color: var(--primary); }
    .stat-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    
    .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1.5px solid var(--border); }
    .tab-btn { 
      padding: 12px 16px; font-size: 14px; font-weight: 800; 
      color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; 
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .inventory-item { 
      display: flex; align-items: center; gap: 12px; padding: 12px 0; 
      border-bottom: 1px solid var(--border); 
    }
    .stock-tag { 
      padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 800; 
    }
    .stock-low { background: #fee2e2; color: #ef4444; }
    .stock-ok { background: #dcfce7; color: #16a34a; }

    #verify-scanner { width: 100%; aspect-ratio: 1; border-radius: 24px; overflow: hidden; background: #000; margin-top: 16px; display: none; }
  </style>
</head>

<body class="page-anim">
  <div class="mesh-bg" style="background: radial-gradient(circle at 100% 0%, #f0fdf4 0%, #f8fafc 100%);"></div>

  <header class="topbar">
    <div class="tb-left">
      <div style="font-family:'Outfit';font-weight:900;color:var(--primary);font-size:22px">ADMIN</div>
    </div>
    <div class="tb-right">
      <button class="tb-btn" onclick="location.reload()" style="color:var(--text)"><span class="material-icons">refresh</span></button>
    </div>
  </header>

  <div class="page">
    <div class="admin-header">
      <h1 style="font-size:24px;font-weight:900">Dashboard</h1>
      <div style="font-size:12px;font-weight:700;color:var(--text-muted)" id="current-time">...</div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Revenue</div>
        <div class="stat-val" id="stat-rev">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Orders</div>
        <div class="stat-val" id="stat-orders">0</div>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab-btn active" onclick="showTab('inventory', this)">Inventory</div>
      <div class="tab-btn" onclick="showTab('verify', this)">Verify QR</div>
      <div class="tab-btn" onclick="showTab('transactions', this)">Sales</div>
    </div>

    <!-- INVENTORY -->
    <div id="tab-inventory" class="tab-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:16px;font-weight:800">Stock Levels</h3>
        <button class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:12px" onclick="alert('Demo: Add Product')">Add New</button>
      </div>
      <div class="card" id="stock-list">
        <!-- Stock Items -->
      </div>
    </div>

    <!-- QR VERIFICATION -->
    <div id="tab-verify" class="tab-content" style="display:none">
      <div class="card" style="text-align:center">
        <span class="material-icons" style="font-size:48px;color:var(--primary)">qr_code_scanner</span>
        <h3 style="margin:12px 0">Exit Verification</h3>
        <p style="font-size:13px;color:var(--text-muted)">Scan a customer's receipt QR to verify payment status and prevent double exit.</p>
        
        <div id="verify-scanner"></div>
        
        <button class="btn btn-primary" style="margin-top:20px" id="scan-btn" onclick="startVerification()">START SCANNING</button>
        
        <div id="verify-result" style="margin-top:20px;display:none">
          <div id="v-status" style="padding:16px;border-radius:16px;font-weight:900;font-size:18px"></div>
        </div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div id="tab-transactions" class="tab-content" style="display:none">
      <div class="card" id="order-list">
        <!-- Orders -->
      </div>
    </div>

  </div>

  <div id="toasts"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/products.js"></script>
  <script>
    async function init() {
      document.getElementById('current-time').textContent = new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      
      const prods = await fetchProducts();
      const orders = JSON.parse(localStorage.getItem('ssc_purchase_history') || '[]'); // Global history
      
      // Stats
      const totalRev = orders.reduce((s,o) => s + o.total, 0);
      document.getElementById('stat-rev').textContent = '₹' + totalRev;
      document.getElementById('stat-orders').textContent = orders.length;

      // Inventory
      document.getElementById('stock-list').innerHTML = prods.map(p => `
        <div class="inventory-item">
          <div style="font-size:24px;width:44px;height:44px;border-radius:12px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center">${p.emoji}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700">${p.name}</div>
            <div style="font-size:11px;color:var(--text-muted)">₹${p.price} • ${p.category}</div>
          </div>
          <div class="stock-tag ${p.stock < 10 ? 'stock-low' : 'stock-ok'}">${p.stock || 50} in stock</div>
        </div>
      `).join('');

      // Orders
      if (!orders.length) {
        document.getElementById('order-list').innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px">No transactions yet.</p>';
      } else {
        document.getElementById('order-list').innerHTML = orders.reverse().map(o => `
          <div style="padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px;font-weight:800">#${o.id.slice(-6)}</span>
              <span style="font-size:13px;font-weight:900;color:var(--primary)">₹${o.total}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)">
              <span>${o.items.length} items • ${o.method.toUpperCase()}</span>
              <span>${new Date(o.time).toLocaleTimeString()}</span>
            </div>
          </div>
        `).join('');
      }
    }

    function showTab(tabId, el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      document.getElementById('tab-' + tabId).style.display = 'block';
    }

    function startVerification() {
      const scannerWrap = document.getElementById('verify-scanner');
      scannerWrap.style.display = 'block';
      document.getElementById('scan-btn').style.display = 'none';
      
      const scanner = new Html5Qrcode("verify-scanner");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          scanner.stop();
          scannerWrap.style.display = 'none';
          document.getElementById('scan-btn').style.display = 'block';
          verifyQR(decodedText);
        }
      );
    }

    function verifyQR(data) {
      const resWrap = document.getElementById('verify-result');
      const statusEl = document.getElementById('v-status');
      resWrap.style.display = 'block';
      
      try {
        const qr = JSON.parse(data);
        const now = Date.now();
        
        if (qr.exp < now) {
          statusEl.textContent = '❌ EXPIRED RECEIPT';
          statusEl.style.background = '#fee2e2';
          statusEl.style.color = '#ef4444';
        } else {
          statusEl.textContent = '✅ VERIFIED: PAID';
          statusEl.style.background = '#dcfce7';
          statusEl.style.color = '#16a34a';
          // Mark as used logic here
        }
      } catch (e) {
        statusEl.textContent = '⚠️ INVALID QR CODE';
        statusEl.style.background = '#fef3c7';
        statusEl.style.color = '#d97706';
      }
    }

    init();
  </script>
</body>
</html>
