<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel — SmartCheckout</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #fff; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
  .stat-val { font-size: 28px; font-weight: 900; color: var(--green); }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
  
  .stock-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); }
  .stock-info { display: flex; align-items: center; gap: 10px; }
  .stock-input { width: 60px; padding: 6px; border: 1px solid var(--border); border-radius: 8px; text-align: center; font-weight: 800; }
  
  .log-row { font-size: 12px; padding: 8px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; }
</style>
</head>
<body class="page-anim">

<header class="topbar">
  <div class="topbar-logo">Admin Dashboard</div>
  <div class="tb-right">
    <button class="tb-btn" onclick="location.reload()"><span class="material-icons">refresh</span></button>
  </div>
</header>

<div class="page">
  <div class="admin-grid">
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-val" id="stat-rev">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Orders Today</div>
      <div class="stat-val" id="stat-orders">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Products</div>
      <div class="stat-val" id="stat-prods">0</div>
    </div>
  </div>

  <div class="card">
    <div class="sh">Inventory Management</div>
    <div id="stock-list"></div>
  </div>

  <div class="card">
    <div class="sh">Recent QR Verifications</div>
    <div id="qr-logs">
      <div class="empty" style="padding: 20px"><p>No verification logs yet</p></div>
    </div>
  </div>
</div>

<nav class="bnav">
  <a href="home.html" class="ni"><span class="material-icons">home</span>Home</a>
  <a href="admin.html" class="ni active"><span class="material-icons">dashboard</span>Admin</a>
  <div class="ni-placeholder"></div>
  <a href="cart.html" class="ni"><span class="material-icons">shopping_bag</span>Cart</a>
  <a href="profile.html" class="ni"><span class="material-icons">person</span>Profile</a>
</nav>

<script src="js/products.js"></script>
<script>
async function init(){
  const products = await fetchProducts();
  const orders = JSON.parse(localStorage.getItem('ssc_orders') || '[]');
  
  // Stats
  const totalRev = orders.reduce((s,o)=>s+o.total, 0);
  document.getElementById('stat-rev').textContent = '₹' + totalRev;
  document.getElementById('stat-orders').textContent = orders.length;
  document.getElementById('stat-prods').textContent = products.length;

  // Inventory
  document.getElementById('stock-list').innerHTML = products.map(p => `
    <div class="stock-item">
      <div class="stock-info">
        <span style="font-size:24px">${p.emoji}</span>
        <div>
          <div style="font-size:14px;font-weight:700">${p.name}</div>
          <div style="font-size:11px;color:var(--muted)">ID: ${p.id}</div>
        </div>
      </div>
      <input type="number" class="stock-input" value="${p.stock || 0}" onchange="updateStock('${p.id}', this.value)"/>
    </div>
  `).join('');

  // Logs
  const qrUsed = localStorage.getItem('ssc_qr_used') === 'true';
  const qrData = JSON.parse(localStorage.getItem('ssc_qr_data') || 'null');
  if(qrData){
    document.getElementById('qr-logs').innerHTML = `
      <div class="log-row">
        <span>Order: ${qrData.id.slice(-8)}</span>
        <span style="color:${qrUsed?'var(--green)':'var(--amber)'};font-weight:800">${qrUsed?'VERIFIED':'PENDING'}</span>
      </div>
      <div style="font-size:10px;color:var(--muted)">Verified at: ${new Date().toLocaleTimeString()}</div>
    `;
  }
}

function updateStock(id, val){
  // In a real app, this would be a fetch call.
  // Here we simulate updating the local object (though it won't persist in products.js file)
  console.log(`Updating stock for ${id} to ${val}`);
  // toast('Stock updated locally', 'green');
}

init();
</script>
</body>
</html>
