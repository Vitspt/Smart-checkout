<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Cart — SmartCheckout</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body class="page-anim" style="background: #0b0f1a;">
<div class="mesh-bg"></div>

<header class="topbar">
  <div class="tb-left">
    <a href="javascript:history.back()" class="tb-btn"><span class="material-icons">chevron_left</span></a>
    <a href="javascript:history.forward()" class="tb-btn"><span class="material-icons">chevron_right</span></a>
  </div>
  <div class="topbar-logo">CONVIX <span style="color:#ef4d23; font-style:italic; font-family:'Instrument Serif'">Smart</span></div>
  <div class="tb-right">
    <button class="tb-btn" onclick="if(confirm('Clear cart?')){clearCart();renderCart();}" title="Clear cart">
      <span class="material-icons">delete_outline</span>
    </button>
  </div>
</header>

<div class="page" style="padding-top:14px; background: #0b0f1a; min-height: 100vh;" id="cart-page">
  <!-- Filled by JS -->
</div>

<div id="toasts"></div>

<!-- CENTERED FAB SCAN -->
<button class="fab-center" onclick="location.href='scanner.html'" aria-label="Scan product">
  <span class="material-icons">qr_code_scanner</span>
</button>

<nav class="bnav">
  <a href="home.html" class="ni" data-i18n="nav_home"><span class="material-icons">home</span>Home</a>
  <a href="category.html?c=All" class="ni" data-i18n="nav_shop"><span class="material-icons">grid_view</span>All Categories</a>
  <div class="ni-placeholder"></div>
  <a href="cart.html" class="ni active badge" data-i18n="nav_cart"><span class="material-icons">shopping_bag</span><span class="badge-dot cart-badge" style="display:none">0</span>Cart</a>
  <a href="profile.html" class="ni" data-i18n="nav_profile"><span class="material-icons">person</span>Profile</a>
</nav>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/ai.js"></script>
<script src="js/agent.js"></script>
<script>
function toast(msg,type='green'){
  const el=document.createElement('div'); el.className=`toast ${type}`;
  el.innerHTML=`<span class="material-icons" style="font-size:18px">check_circle</span>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.classList.add('hide');setTimeout(()=>el.remove(),300);},2500);
}

function renderCart(){
  updateCartBadge();
  const cart=getCart();
  const page=document.getElementById('cart-page');
  if(!cart.length){
    page.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><h3 data-i18n="empty_cart">${window.t('empty_cart')}</h3><p data-i18n="empty_cart_msg">${window.t('empty_cart_msg')}</p><a href="home.html" class="btn btn-primary" style="margin-top:8px;text-decoration:none" data-i18n="browse_products">${window.t('browse_products')}</a></div>`; return;
  }
  
  const subtotal=getCartSubtotal(), mrpTotal=getCartMRP();
  let finalSubtotal = subtotal;
  let couponDisc = 0;
  
  // AUTO APPLY COUPON (Default for all purchases)
  let activeCoupon = JSON.parse(localStorage.getItem(ukey('active_coupon')) || 'null');
  if(!activeCoupon && cart.length > 0) {
    activeCoupon = { code: 'WELCOME20', discount: 20 };
    localStorage.setItem(ukey('active_coupon'), JSON.stringify(activeCoupon));
  }
  
  if(activeCoupon) {
    couponDisc = Math.round(subtotal * (activeCoupon.discount / 100));
    finalSubtotal = subtotal - couponDisc;
  }
  
  const tax=Math.round(finalSubtotal*TAX_RATE), total=finalSubtotal+tax;
  const totalDisc = (mrpTotal - subtotal) + couponDisc;

  page.innerHTML=`
    <div style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:10px">${cart.reduce((s,i)=>s+i.qty,0)} ${window.t('items_in_cart')}</div>
    <div id="cart-list">
      ${cart.map(item=>`
        <div class="cart-item">
          <div class="cart-img-ph">
            ${item.img ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.innerHTML='${item.emoji}'"/>` : item.emoji}
          </div>
          <div class="cart-info">
            <div class="cart-name">${item.name}</div>
            <div class="cart-brand">${item.brand}</div>
            <div class="cart-price">${formatPrice(item.price * item.qty)}</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="doQty('${item.id}',-1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="doQty('${item.id}',1)">+</button>
            </div>
          </div>
        </div>`).join('')}
    </div>

    <div class="card">
      <div style="font-size:13px;font-weight:800;margin-bottom:10px">🏷️ Coupon Code</div>
      <div class="coupon-row" style="display:flex;gap:8px">
        <input class="form-input" id="coupon-inp" type="text" value="${activeCoupon ? activeCoupon.code : ''}" placeholder="Enter code..." style="flex:1"/>
        <button class="btn btn-primary" style="width:auto;padding:0 16px;height:44px;font-size:12px" onclick="applyCoupon()">${activeCoupon ? 'Change' : 'Apply'}</button>
        ${activeCoupon ? `<button class="btn btn-outline" style="width:auto;padding:0 16px;height:44px;font-size:12px;color:#ef4444;border-color:#ef4444" onclick="removeCoupon()">Remove</button>` : ''}
      </div>
      <div id="coupon-msg" style="font-size:12px;margin-top:4px"></div>
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:800;margin-bottom:12px">Price Breakdown</div>
      <div class="price-row"><span>MRP Total</span><span>${formatPrice(mrpTotal)}</span></div>
      ${(mrpTotal-subtotal)>0?`<div class="price-row green"><span>Product Discount</span><span>− ${formatPrice(mrpTotal-subtotal)}</span></div>`:''}
      ${couponDisc>0?`<div class="price-row green" style="font-weight:800"><span>Coupon (${activeCoupon.code})</span><span>− ${formatPrice(couponDisc)}</span></div>`:''}
      ${tax>0?`<div class="price-row"><span>GST</span><span>+ ${formatPrice(tax)}</span></div>`:''}
      <div class="price-row total"><span>Total Payable</span><span style="color:var(--primary)">${formatPrice(total)}</span></div>
      ${totalDisc>0?`<div style="background:rgba(16,185,129,0.1);color:#10b981;font-size:12px;font-weight:700;padding:8px 10px;border-radius:8px;margin-top:10px">🎉 You are saving ${formatPrice(totalDisc)} on this order!</div>`:''}
    </div>

    <div class="sticky-cta" style="bottom:calc(var(--nav) + 12px); padding:0 14px">
      <button class="btn btn-primary" onclick="location.href='payment.html'" style="width:100%; height:56px; border-radius:16px; background:var(--primary); font-weight:800">
        Proceed to Pay — ${formatPrice(total)}
      </button>
    </div>
  `;
}

function renderRecs(){
  const cart = getCart();
  const recs = getRecommendations(cart);
  const wrap = document.getElementById('cart-recommendations');
  if(!recs.length){ wrap.style.display='none'; return; }
  
  wrap.innerHTML = `
    <div class="sh" style="margin:16px 0 10px;font-size:14px">💡 Frequently Bought Together</div>
    <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none">
      ${recs.map(p => `
        <div class="card" style="min-width:140px;padding:12px;flex-shrink:0;text-align:center" onclick="location.href='product.html?id=${p.id}'">
          <div style="height:60px;display:flex;align-items:center;justify-content:center;margin-bottom:8px">
            ${p.img && !p.img.includes('unsplash') ? `<img src="${p.img}" style="max-width:100%;max-height:100%;object-fit:contain"/>` : `<span style="font-size:32px">${p.emoji}</span>`}
          </div>
          <div style="font-size:12px;font-weight:700;margin-bottom:4px;height:32px;overflow:hidden">${p.name}</div>
          <div style="font-size:13px;font-weight:800;color:var(--green);margin-bottom:8px">${formatPrice(p.price)}</div>
          <button class="btn btn-primary" onclick="event.stopPropagation();addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')});toast('${p.name} added');renderCart();" style="height:28px;font-size:11px;padding:0 10px">Add</button>
        </div>
      `).join('')}
    </div>
  `;
}

function doQty(id, delta){
  updateQty(id, delta);
  renderCart();
}

function doRemove(id){
  removeFromCart(id);
  toast('Item removed');
  renderCart();
}

function applyCoupon() {
  const code = document.getElementById('coupon-inp').value.trim().toUpperCase();
  const msg = document.getElementById('coupon-msg');
  if(!code) return;

  const coupons = JSON.parse(localStorage.getItem('ssc_coupons') || '[]');
  const c = coupons.find(x => x.code === code);
  
  if(c) {
    localStorage.setItem(ukey('active_coupon'), JSON.stringify(c));
    toast(`Coupon ${c.code} applied!`);
    renderCart();
  } else if (code === 'WELCOME20') {
    localStorage.setItem(ukey('active_coupon'), JSON.stringify({ code: 'WELCOME20', discount: 20 }));
    toast('Welcome coupon applied!');
    renderCart();
  } else {
    msg.style.color = '#ef4444';
    msg.textContent = 'Invalid coupon code';
  }
}

function removeCoupon() {
  localStorage.removeItem(ukey('active_coupon'));
  toast('Coupon removed');
  renderCart();
}

renderCart();
</script>
</body>
</html>
