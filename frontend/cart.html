<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Your Cart — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="page-anim">
  <div class="mesh-bg"></div>

  <header class="topbar">
    <div class="tb-left">
      <button class="tb-btn" onclick="history.back()" style="color:var(--text)">
        <span class="material-icons">arrow_back</span>
      </button>
    </div>
    <div class="topbar-logo">YOUR CART</div>
    <div class="tb-right">
      <button class="tb-btn" onclick="if(confirm('Clear cart?')){clearCart();renderCart();}" style="color:var(--red)">
        <span class="material-icons">delete_sweep</span>
      </button>
    </div>
  </header>

  <div class="page" id="cart-content">
    <!-- Items loaded here -->
  </div>

  <div id="toasts"></div>

  <nav class="bnav">
    <a href="home.html" class="ni"><span class="material-icons">home</span>Home</a>
    <a href="category.html?c=All" class="ni"><span class="material-icons">grid_view</span>All</a>
    <div class="ni-placeholder"></div>
    <a href="cart.html" class="ni active"><span class="material-icons">shopping_bag</span>Cart</a>
    <a href="profile.html" class="ni"><span class="material-icons">person</span>Profile</a>
  </nav>

  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    function toast(msg) {
      const t = document.createElement('div');
      t.className = `toast`;
      t.innerHTML = `<span class="material-icons">check_circle</span> ${msg}`;
      document.getElementById('toasts').appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function renderCart() {
      const cart = getCart();
      const wrap = document.getElementById('cart-content');
      
      if (!cart.length) {
        wrap.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Scan some products to get started!</p>
            <button class="btn btn-primary" style="margin-top:24px" onclick="location.href='scanner.html'">Start Scanning</button>
          </div>
        `;
        return;
      }

      const subtotal = getCartSubtotal();
      const tax = Math.round(subtotal * 0.05); // 5% tax
      const total = subtotal + tax;

      wrap.innerHTML = `
        <div class="slide-up">
          ${cart.map(i => `
            <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px">
              <div style="font-size:32px;width:60px;height:60px;border-radius:12px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center">${i.emoji || '📦'}</div>
              <div style="flex:1">
                <div style="font-size:15px;font-weight:700">${i.name}</div>
                <div style="font-size:14px;font-weight:800;color:var(--primary)">₹${i.price}</div>
              </div>
              <div style="display:flex;align-items:center;gap:12px;background:var(--bg-soft);padding:4px 10px;border-radius:12px">
                <span class="material-icons" style="font-size:20px;cursor:pointer;color:var(--text-muted)" onclick="doQty('${i.id}', -1)">remove_circle_outline</span>
                <span style="font-weight:800;min-width:14px;text-align:center">${i.qty}</span>
                <span class="material-icons" style="font-size:20px;cursor:pointer;color:var(--primary)" onclick="doQty('${i.id}', 1)">add_circle_outline</span>
              </div>
            </div>
          `).join('')}

          <div class="card" style="margin-top:24px">
            <h3 style="font-size:16px;font-weight:800;margin-bottom:16px">Order Summary</h3>
            <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px">
              <span style="color:var(--text-muted)">Subtotal</span>
              <span style="font-weight:700">₹${subtotal}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px">
              <span style="color:var(--text-muted)">Tax (5%)</span>
              <span style="font-weight:700">₹${tax}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:900;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)">
              <span>Total Amount</span>
              <span style="color:var(--primary)">₹${total}</span>
            </div>
          </div>

          <button class="btn btn-primary" onclick="location.href='payment.html'" style="margin-top:10px">
            Proceed to Payment <span class="material-icons">arrow_forward</span>
          </button>
        </div>
      `;
    }

    function doQty(id, delta) {
      updateQty(id, delta);
      renderCart();
      updateCartBadge();
    }

    renderCart();
    updateCartBadge();
  </script>
</body>
</html>
