<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Your Receipt — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .receipt-card { 
      background: #fff; border-radius: 32px; padding: 32px 24px; 
      border: 1.5px solid var(--border); box-shadow: var(--shadow-lg);
      text-align: center; position: relative;
    }
    #qr-wrap { 
      background: #f8fafc; padding: 20px; border-radius: 24px; 
      display: inline-block; margin: 20px 0; border: 1.5px solid var(--border);
    }
    .timer { 
      font-size: 13px; font-weight: 800; color: var(--red); 
      background: #fef2f2; padding: 6px 16px; border-radius: 99px;
      display: inline-flex; align-items: center; gap: 6px;
    }
  </style>
</head>

<body class="page-anim">
  <div class="mesh-bg"></div>

  <header class="topbar">
    <div class="tb-left">
      <button class="tb-btn" onclick="location.href='home.html'" style="color:var(--text)">
        <span class="material-icons">home</span>
      </button>
    </div>
    <div class="topbar-logo">RECEIPT</div>
    <div class="tb-right"></div>
  </header>

  <div class="page">
    <div class="receipt-card slide-up">
      <div style="font-size:48px">🎉</div>
      <h2 style="font-size:22px;font-weight:900;margin:12px 0 4px">Payment Successful!</h2>
      <p style="font-size:13px;color:var(--text-muted)">Your order has been verified.</p>

      <div id="qr-wrap">
        <div id="qr-canvas"></div>
      </div>

      <div style="margin-bottom:20px">
        <div class="timer">
          <span class="material-icons" style="font-size:16px">timer</span>
          Expires in <span id="timer-val">10:00</span>
        </div>
      </div>

      <div style="text-align:left;border-top:1px dashed var(--border);padding-top:20px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px">
          <span style="color:var(--text-muted)">Order ID</span>
          <span style="font-weight:800" id="order-id">#000000</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:20px;font-size:13px">
          <span style="color:var(--text-muted)">Total Paid</span>
          <span style="font-weight:800;color:var(--primary)" id="order-total">₹0</span>
        </div>
        
        <div id="items-list" style="max-height:120px;overflow-y:auto;scrollbar-width:none">
          <!-- Items -->
        </div>
      </div>

      <button class="btn btn-primary" style="margin-top:24px" onclick="location.href='home.html'">
        DONE
      </button>
      <button class="btn btn-outline" style="margin-top:10px;border:none;color:var(--primary)" onclick="window.print()">
        <span class="material-icons">download</span> Download PDF
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let timeLeft = 600; // 10 minutes

    function startTimer() {
      const timerEl = document.getElementById('timer-val');
      const interval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timerEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 0) {
          clearInterval(interval);
          document.getElementById('qr-wrap').style.opacity = '0.3';
          document.getElementById('qr-wrap').style.pointerEvents = 'none';
          timerEl.textContent = 'EXPIRED';
        }
      }, 1000);
    }

    function init() {
      const order = JSON.parse(localStorage.getItem(ukey('last_order')) || 'null');
      if (!order) { location.href = 'home.html'; return; }

      document.getElementById('order-id').textContent = '#' + order.id.slice(-6);
      document.getElementById('order-total').textContent = '₹' + order.total;
      
      document.getElementById('items-list').innerHTML = order.items.map(i => `
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px">
          <span>${i.qty}x ${i.name}</span>
          <span style="color:var(--text-muted)">₹${i.price * i.qty}</span>
        </div>
      `).join('');

      // Generate secure QR data
      const qrData = JSON.stringify({
        id: order.id,
        t: order.total,
        exp: Date.now() + (10 * 60 * 1000), // Expiry timestamp
        u: order.used
      });

      new QRCode(document.getElementById('qr-canvas'), {
        text: qrData,
        width: 160,
        height: 160,
        colorDark: "#0f172a",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      startTimer();
    }

    init();
  </script>
</body>
</html>
