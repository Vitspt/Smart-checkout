<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Your Profile — SmartCheckout Premium</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .prof-card { 
      background: linear-gradient(135deg, var(--primary), #22c55e); 
      border-radius: 32px; padding: 32px 24px; color: #fff; 
      text-align: center; margin-bottom: 24px;
      box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
    }
    .avatar { 
      width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2);
      border: 3px solid #fff; margin: 0 auto 16px; display: flex; 
      align-items: center; justify-content: center; font-size: 32px; font-weight: 900;
    }
    .menu-list { background: #fff; border-radius: 24px; border: 1.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    .menu-item { 
      display: flex; align-items: center; gap: 16px; padding: 16px 20px; 
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item .material-icons { color: var(--primary); }
    .menu-label { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
  </style>
</head>

<body class="page-anim">
  <div class="mesh-bg"></div>

  <header class="topbar">
    <div class="tb-left">
      <button class="tb-btn" onclick="history.back()" style="color:var(--text)">
        <span class="material-icons">arrow_back</span>
      </button>
    </div>
    <div class="topbar-logo">PROFILE</div>
    <div class="tb-right">
      <button class="tb-btn" onclick="logout()" style="color:var(--red)"><span class="material-icons">logout</span></button>
    </div>
  </header>

  <div class="page">
    <div class="prof-card slide-up">
      <div class="avatar" id="prof-initial">U</div>
      <h2 id="prof-name" style="font-size:22px;font-weight:900">User Name</h2>
      <p id="prof-email" style="font-size:13px;opacity:0.9">user@example.com</p>
      
      <div style="display:flex;gap:12px;margin-top:24px">
        <div style="flex:1;background:rgba(255,255,255,0.15);padding:12px;border-radius:16px">
          <div style="font-size:11px;font-weight:800;text-transform:uppercase">Orders</div>
          <div id="stat-orders" style="font-size:18px;font-weight:900">0</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.15);padding:12px;border-radius:16px">
          <div style="font-size:11px;font-weight:800;text-transform:uppercase">Points</div>
          <div style="font-size:18px;font-weight:900">1,240</div>
        </div>
      </div>
    </div>

    <h3 style="font-size:16px;font-weight:800;margin-bottom:12px">Settings & Activity</h3>
    <div class="menu-list slide-up" style="animation-delay:0.1s">
      <div class="menu-item" onclick="location.href='scanner.html'">
        <span class="material-icons">qr_code_scanner</span>
        <div class="menu-label">Scan History</div>
        <span class="material-icons" style="color:var(--text-muted)">chevron_right</span>
      </div>
      <div class="menu-item" onclick="alert('Demo: Edit Profile')">
        <span class="material-icons">person_outline</span>
        <div class="menu-label">Personal Details</div>
        <span class="material-icons" style="color:var(--text-muted)">chevron_right</span>
      </div>
      <div class="menu-item" onclick="location.href='admin.html'">
        <span class="material-icons">admin_panel_settings</span>
        <div class="menu-label">Admin Access</div>
        <span class="material-icons" style="color:var(--text-muted)">chevron_right</span>
      </div>
      <div class="menu-item" onclick="logout()">
        <span class="material-icons" style="color:var(--red)">logout</span>
        <div class="menu-label" style="color:var(--red)">Logout</div>
      </div>
    </div>
  </div>

  <nav class="bnav">
    <a href="home.html" class="ni"><span class="material-icons">home</span>Home</a>
    <a href="category.html?c=All" class="ni"><span class="material-icons">grid_view</span>All</a>
    <div class="ni-placeholder"></div>
    <a href="cart.html" class="ni"><span class="material-icons">shopping_bag</span>Cart</a>
    <a href="profile.html" class="ni active"><span class="material-icons">person</span>Profile</a>
  </nav>

  <script src="js/auth.js"></script>
  <script>
    function init() {
      const user = getCurrentUser();
      if (user) {
        document.getElementById('prof-name').textContent = user.name;
        document.getElementById('prof-email').textContent = user.email;
        document.getElementById('prof-initial').textContent = user.name[0].toUpperCase();
      }

      const orders = JSON.parse(localStorage.getItem(ukey('purchase_history')) || '[]');
      document.getElementById('stat-orders').textContent = orders.length;
    }

    function logout() {
      if (confirm('Logout from SmartCheckout?')) {
        localStorage.removeItem('ssc_token');
        location.href = 'login.html';
      }
    }

    init();
  </script>
</body>
</html>
