<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Login — SmartCheckout</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .login-outer { min-height: 100vh; background: #0b0f1a; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
    .login-outer::before { content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(239, 77, 35, .06); top: -80px; right: -80px; }
    .login-container { width: 100%; max-width: 390px; position: relative; z-index: 1; }
    .login-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 24px; padding: 32px 24px; color: #fff; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-logo { font-size: 48px; display: block; margin-bottom: 10px; }
    .login-title { font-size: 24px; font-weight: 900; color: #fff; }
    .login-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="login-outer">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <span class="login-logo">🛡️</span>
          <div class="login-title">Admin Access</div>
          <div class="login-sub">Enter administrative credentials</div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input class="form-input" id="adm-email" type="email" placeholder="admin@smart.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="adm-pass" type="password" placeholder="••••••••" />
        </div>
        
        <button class="btn btn-primary" style="margin-top:8px" onclick="handleLogin()">Sign In to Dashboard</button>
        
        <div style="text-align:center;margin-top:24px">
          <a href="login.html" style="font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none;font-weight:700">BACK TO STORE</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('adm-email').value.trim();
      const pass = document.getElementById('adm-pass').value.trim();

      if (email === 'admin@smart.com' && pass === 'admin123') {
        localStorage.setItem('ssc_admin_token', 'ADM_' + Date.now());
        location.href = 'admin_dashboard.html';
      } else {
        alert('Invalid Admin Credentials');
      }
    }
  </script>
</body>
</html>
