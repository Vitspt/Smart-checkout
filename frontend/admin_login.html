<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Login — SmartCheckout</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <style>
    :root { --primary: #16a34a; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-card { background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    .logo { width: 64px; height: 64px; background: var(--primary); color: #fff; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: var(--text); }
    p { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #94a3b8; display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; }
    input:focus { border-color: var(--primary); }
    .btn { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><span class="material-icons" style="font-size:32px">admin_panel_settings</span></div>
    <h1>Admin Access</h1>
    <p>Please enter your administrative credentials</p>
    
    <div class="input-group">
      <label>Admin Email</label>
      <input type="email" id="adm-email" placeholder="admin@smart.com" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="adm-pass" placeholder="••••••••" />
    </div>
    
    <button class="btn" onclick="handleLogin()">SIGN IN TO DASHBOARD</button>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('adm-email').value.trim();
      const pass = document.getElementById('adm-pass').value.trim();

      // Separate Admin Credentials
      if (email === 'admin@smart.com' && pass === 'admin123') {
        localStorage.setItem('ssc_admin_token', 'ADM_' + Date.now());
        location.href = 'admin_dashboard.html';
      } else {
        alert('Invalid Admin Credentials');
      }
    }
  </script>
</body>
</html>
